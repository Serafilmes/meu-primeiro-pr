    .glyph { fill:none; stroke:#2BB58C; stroke-linecap:round; stroke-linejoin:round; }
  </style>
  <rect x="0" y="0" width="680" height="190" rx="22" fill="#0E1513"/>
  <text x="331" y="120" text-anchor="end" class="word" font-size="72" letter-spacing="-1.5">6fl</text>
  <g transform="translate(372,102) scale(0.369)">
    <path class="glyph" vector-effect="non-scaling-stroke" stroke-width="8"
      d="M0,0 C0,-27.6 -22.4,-50 -50,-50 C-77.6,-50 -100,-27.6 -100,0 C-100,27.6 -77.6,50 -50,50 C-22.4,50 0,27.6 0,0 C0,-27.6 22.4,-50 50,-50 C77.6,-50 100,-27.6 100,0 C100,27.6 77.6,50 50,50 C22.4,50 0,27.6 0,0 Z"/>
  </g>
  <text x="413" y="120" class="word" font-size="72" letter-spacing="-1.5">r</text>
