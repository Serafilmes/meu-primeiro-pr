<svg width="264" height="144" viewBox="0 0 264 144" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>6floor — símbolo trabalhando (forma e dissolve)</title>
  <desc>O símbolo do 6floor no estado ativo: o laço contorna os dois "o" (esquerdo → direito), fica inteiro aceso por um instante e dissolve pelo mesmo caminho, em ritmo calmo. Indicador de status.</desc>
  <style>
    .fantasma { fill:none; stroke:#2BB58C; stroke-opacity:0.10; stroke-linecap:round; stroke-linejoin:round; }
    .forma { fill:none; stroke:#2BB58C; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:1000 1000; animation:forma 6s ease-in-out infinite; }
    @keyframes forma { 0% { stroke-dashoffset:1000; } 46% { stroke-dashoffset:0; } 54% { stroke-dashoffset:0; } 100% { stroke-dashoffset:-1000; } }
  </style>
  <g transform="translate(132,72)">
    <path class="fantasma" stroke-width="24"
      d="M0,0 C0,-27.6 -22.4,-50 -50,-50 C-77.6,-50 -100,-27.6 -100,0 C-100,27.6 -77.6,50 -50,50 C-22.4,50 0,27.6 0,0 C0,-27.6 22.4,-50 50,-50 C77.6,-50 100,-27.6 100,0 C100,27.6 77.6,50 50,50 C22.4,50 0,27.6 0,0 Z"/>
    <path class="forma" stroke-width="24" pathLength="1000"
      d="M0,0 C0,-27.6 -22.4,-50 -50,-50 C-77.6,-50 -100,-27.6 -100,0 C-100,27.6 -77.6,50 -50,50 C-22.4,50 0,27.6 0,0 C0,-27.6 22.4,-50 50,-50 C77.6,-50 100,-27.6 100,0 C100,27.6 77.6,50 50,50 C22.4,50 0,27.6 0,0 Z"/>
  </g>
</svg>
